<!-- AI Chatbot Component -->
<style>
    #aiChatWidget {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1050;
        font-family: var(--font-primary);
        display: none; /* hidden by default, toggled via floating button */
        animation: fadeInUp 0.3s ease;
    }
    
    #aiChatButton {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1049;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--bs-primary), #c28841);
        color: white;
        border: none;
        box-shadow: 0 4px 20px rgba(222, 173, 111, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: var(--transition-base);
    }
    
    #aiChatButton:hover {
        transform: scale(1.05) translateY(-5px);
        box-shadow: 0 8px 25px rgba(222, 173, 111, 0.4);
    }
    
    .chat-card {
        width: 350px;
        height: 500px;
        background: #ffffff;
        border: 1px solid #e0e0e0;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        border-radius: 15px;
        overflow: hidden;
    }
    
    .chat-header {
        background: rgba(222, 173, 111, 0.1);
        padding: 1rem;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .chat-messages {
        flex-grow: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }
    
    .chat-messages::-webkit-scrollbar {
        width: 4px;
    }
    
    .msg-bubble {
        max-width: 85%;
        padding: 0.8rem 1rem;
        border-radius: 15px;
        font-size: 0.9rem;
        line-height: 1.4;
    }
    
    .msg-user {
        background: #DEAD6F;
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
    }
    
    .msg-ai {
        background: rgba(222, 173, 111, 0.15);
        color: #333;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        border: 1px solid rgba(222, 173, 111, 0.3);
    }
    
    .msg-ai a {
        color: var(--primary);
        text-decoration: underline;
    }
    
    .chat-input {
        padding: 1rem;
        background: #fdfdfd;
        border-top: 1px solid #e0e0e0;
    }
    
    .typing-indicator {
        display: flex;
        gap: 4px;
        padding: 0.8rem 1rem;
        background: rgba(222, 173, 111, 0.1);
        border-radius: 15px;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        display: none;
    }
    
    .typing-dot {
        width: 6px;
        height: 6px;
        background: var(--primary);
        border-radius: 50%;
        animation: typing 1.4s infinite ease-in-out;
    }
    
    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typing {
        0%, 100% { transform: translateY(0); opacity: 0.4; }
        50% { transform: translateY(-4px); opacity: 1; }
    }
    
    @media (max-width: 576px) {
        .chat-card {
            width: calc(100vw - 40px);
            height: 60vh;
        }
    }
</style>

<!-- Floating Button -->
<button id="aiChatButton" onclick="toggleChat()">
    <i class="bi bi-robot fs-3"></i>
</button>

<!-- Widget -->
<div id="aiChatWidget">
    <div class="chat-card">
        <div class="chat-header">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-magic text-primary fs-4"></i>
                <h6 class="mb-0 fw-bold text-dark">Waggy AI</h6>
            </div>
            <button class="btn btn-sm btn-link text-dark p-0" onclick="toggleChat()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        
        <div class="chat-messages" id="chatArea">
            <div class="msg-bubble msg-ai pb-1">
                Hi there! 🐾 I'm Waggy AI, your intelligent pet care assistant. How can I help you and your furry friend today?
            </div>
            <!-- Dynamic Messages Go Here -->
            
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
        
        <div class="chat-input">
            <form id="aiChatForm" class="d-flex gap-2" onsubmit="handleSend(event)">
                <input type="text" id="aiMessageInput" class="form-control bg-white border-secondary text-dark" placeholder="Ask about pet care..." autocomplete="off">
                <button type="submit" class="btn btn-primary px-3 rounded-circle" id="aiSendBtn">
                    <i class="bi bi-send"></i>
                </button>
            </form>
        </div>
    </div>
</div>
